body:
  text: 第四章寵辱若驚貴大患若身何謂寵辱若驚寵為下也得之若驚失之若驚是謂寵辱若驚何謂貴大患若身吾所以有大患者為吾有身及吾亡身或何患故貴為身於為天下若可以託天下矣愛以身為天下若何以寄天下矣
